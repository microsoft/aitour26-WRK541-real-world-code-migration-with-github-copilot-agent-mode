plugins:
  - glightbox
  - include-markdown
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
        - locale: ja
          name: 日本語
          nav_translations:
            Home: ホーム
            Workshop Navigation: ワークショップのナビゲーション
            Getting Started: はじめに
            Workshop Introduction: ワークショップの紹介
            Open the Repository (Local or Codespaces): リポジトリを開く（ローカルまたは Codespaces）
            Understanding the Project: プロジェクトの理解
            Strategize with Copilot: Copilot で戦略を立てる
            Analyze the Project: プロジェクトの分析
            Converting to C#: C# への変換
            Create C# Scaffolding: C# プロジェクト雛形の作成
            Implementing Endpoints: エンドポイントの実装
            Validation and Testing: 検証とテスト
            Validate correctness and add more endpoints: 正確性の検証と追加エンドポイント
            Add C# Tests: C# テストの追加
            Summary: まとめ
            Bonus Content: ボーナスコンテンツ
            Challenge 1: チャレンジ 1
            Challenge 2: チャレンジ 2
            Challenge 3: チャレンジ 3
            Homework: 宿題
            Reference Materials: 参考資料
            Completed Example Guide: 完成例ガイド
            Glossary: 用語集
            Terminology Guide: 用語ガイド
            For Proctors: プロクター向け
            Common Questions FAQ: よくある質問 (FAQ)
            Troubleshooting Playbook: トラブルシューティング
            Progress Tracker Template: 進捗管理テンプレート
            Resources: リソース

theme:
  name: material
  features:
    - navigation.footer
    - content.code.copy
    - navigation.tabs.sticky 
    - content.tabs.link

  font:
    code: Roboto Mono
    text: Roboto

  palette:
    - scheme: default
      primary: black
      accent: pink
      toggle:
        icon: material/brightness-2
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html

# extra_javascript:
  # - js/custom.js

exclude_docs: |
  README.md
  requirements.txt

extra_css:
  - css/custom.css